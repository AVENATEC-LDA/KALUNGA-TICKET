services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_CDN_URL: ${APP_CDN_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_DISABLE_REGISTRATION: ${APP_DISABLE_REGISTRATION:-false}
      APP_SAAS_MODE_ENABLED: ${APP_SAAS_MODE_ENABLED:-false}
      APP_SAAS_STRIPE_APPLICATION_FEE_PERCENT: ${APP_SAAS_STRIPE_APPLICATION_FEE_PERCENT:-0}
      APP_SAAS_STRIPE_APPLICATION_FEE_FIXED: ${APP_SAAS_STRIPE_APPLICATION_FEE_FIXED:-0}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      FILESYSTEM_PUBLIC_DISK: ${FILESYSTEM_PUBLIC_DISK:-s3-public}
      FILESYSTEM_PRIVATE_DISK: ${FILESYSTEM_PRIVATE_DISK:-s3-private}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
      AWS_PUBLIC_BUCKET: ${AWS_PUBLIC_BUCKET:-}
      AWS_PRIVATE_BUCKET: ${AWS_PRIVATE_BUCKET:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-true}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Hi.Events}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      JWT_ALGO: ${JWT_ALGO:-HS256}
    entrypoint: ["/var/www/html/docker-entrypoint.sh"]
    command: ["php-fpm"]
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on: []

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.ssr
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
      VITE_API_URL_CLIENT: ${VITE_API_URL_CLIENT}
      VITE_API_URL_SERVER: ${VITE_API_URL_SERVER}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
      VITE_APP_NAME: ${VITE_APP_NAME:-Hi.Events}
      VITE_FATHOM_SITE_ID: ${VITE_FATHOM_SITE_ID:-}
    ports:
      - "${FRONTEND_PORT:-5678}:5678"
    depends_on:
      - backend

  queue-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    command: >-
      sh -c "php artisan queue:work --queue=default,webhook-queue --sleep=3 --tries=3 --timeout=60"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_CDN_URL: ${APP_CDN_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      FILESYSTEM_PUBLIC_DISK: ${FILESYSTEM_PUBLIC_DISK:-s3-public}
      FILESYSTEM_PRIVATE_DISK: ${FILESYSTEM_PRIVATE_DISK:-s3-private}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
      AWS_PUBLIC_BUCKET: ${AWS_PUBLIC_BUCKET:-}
      AWS_PRIVATE_BUCKET: ${AWS_PRIVATE_BUCKET:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-true}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Hi.Events}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      JWT_ALGO: ${JWT_ALGO:-HS256}

  scheduler:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    command: >-
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_CDN_URL: ${APP_CDN_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      FILESYSTEM_PUBLIC_DISK: ${FILESYSTEM_PUBLIC_DISK:-s3-public}
      FILESYSTEM_PRIVATE_DISK: ${FILESYSTEM_PRIVATE_DISK:-s3-private}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
      AWS_PUBLIC_BUCKET: ${AWS_PUBLIC_BUCKET:-}
      AWS_PRIVATE_BUCKET: ${AWS_PRIVATE_BUCKET:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-true}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Hi.Events}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      JWT_ALGO: ${JWT_ALGO:-HS256}
